<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>风险模拟器 — 蒙特卡洛</title>
  <meta name="description" content="用三个数字量化不确定性，看清最好、最差和最可能的结果。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/plotly.js-dist@2.30.0/plotly.min.js"></script>
</head>
<body>
  <div class="app-shell">

    <!-- Header -->
    <header class="app-header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">◈</span>
          <span class="logo-text">风险模拟器</span>
        </div>
        <p class="header-tagline">用三个数字，看清未来的可能范围</p>
      </div>
    </header>

    <main class="app-main">

      <!-- Step 1: Preset Scenarios -->
      <section class="step-section">
        <div class="step-header">
          <span class="step-num">1</span>
          <div>
            <h2>选择场景</h2>
            <p class="step-desc">选一个接近你情况的场景，或跳过直接添加变量</p>
          </div>
        </div>
        <div class="scenarios-grid">
          <button class="scenario-card" data-scenario="cost">
            <span class="scenario-icon">📋</span>
            <strong>项目成本估算</strong>
            <span>评估项目各项支出的总成本范围</span>
          </button>
          <button class="scenario-card" data-scenario="revenue">
            <span class="scenario-icon">💰</span>
            <strong>销售收入预测</strong>
            <span>综合多个销售因素预测营收区间</span>
          </button>
          <button class="scenario-card" data-scenario="investment">
            <span class="scenario-icon">📈</span>
            <strong>投资回报分析</strong>
            <span>评估初始投入与回报的盈亏概率</span>
          </button>
        </div>
      </section>

      <!-- Step 2: Variables -->
      <section class="step-section">
        <div class="step-header">
          <span class="step-num">2</span>
          <div>
            <h2>设定变量</h2>
            <p class="step-desc">每个变量填三个数字：最差、最可能、最好</p>
          </div>
        </div>

        <div class="variables-header-row">
          <span class="col-label col-name">变量名称</span>
          <span class="col-label col-val">😟 最差情况</span>
          <span class="col-label col-val">😐 最可能</span>
          <span class="col-label col-val">😊 最好情况</span>
          <span class="col-label col-del"></span>
        </div>

        <div id="variables-list"></div>

        <button class="btn-add" id="add-variable-btn">
          <span>＋</span> 添加变量
        </button>
      </section>

      <!-- Step 3: Run -->
      <section class="step-section run-section">
        <div class="step-header">
          <span class="step-num">3</span>
          <div>
            <h2>运行模拟</h2>
            <p class="step-desc">系统将模拟 <strong>10,000</strong> 种可能的组合</p>
          </div>
        </div>
        <button class="btn-run" id="run-btn">
          <span id="run-btn-text">开始模拟</span>
        </button>
        <div id="error-msg" class="error-msg" style="display:none;"></div>
      </section>

      <!-- Results -->
      <section id="results-section" class="step-section results-section" style="display:none;">
        <div class="step-header">
          <span class="step-num">✓</span>
          <div>
            <h2>模拟结果</h2>
          </div>
        </div>

        <!-- Key conclusion -->
        <div class="conclusion-card">
          <div class="conclusion-main" id="conclusion-text"></div>
          <div class="conclusion-bands">
            <div class="band band-bad">
              <div class="band-label">悲观 (P10)</div>
              <div class="band-value" id="p10-val">—</div>
            </div>
            <div class="band band-mid">
              <div class="band-label">最可能 (P50)</div>
              <div class="band-value" id="p50-val">—</div>
            </div>
            <div class="band band-good">
              <div class="band-label">乐观 (P90)</div>
              <div class="band-value" id="p90-val">—</div>
            </div>
          </div>
        </div>

        <!-- Chart -->
        <div class="chart-card">
          <h3>结果分布</h3>
          <div id="histogram-plot" style="height:320px;"></div>
        </div>

        <!-- Sensitivity -->
        <div class="chart-card" id="sensitivity-card" style="display:none;">
          <h3>影响因素排序 <span class="chart-hint">哪个变量对结果影响最大？</span></h3>
          <div id="sensitivity-plot" style="height:220px;"></div>
        </div>
      </section>

    </main>

    <footer class="app-footer">
      <p>基于蒙特卡洛模拟，每次运行 10,000 次随机采样。结果仅供参考，不构成决策依据。</p>
    </footer>
  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
